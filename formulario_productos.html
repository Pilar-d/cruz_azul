<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <link rel="stylesheet" href="style_formulario_productos.css">
    <title>Farmacia Cruz Azul | Admin de Productos</title>
    
</head>
<body>

    <header>
        <div class="nav-top">
            <div class="logo">CRUZ AZUL <span>★</span></div>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="Buscar productos...">
                <button onclick="filterProducts()">🔍 Buscar</button>
            </div>
            <div class="user-menu">
                👤 Admin Productos
                <li><a href="index.html">Pagina Principal</a></li>
            </div>
        </div>
    </header>

    <section class="hero-banner">
        <div class="hero-content">
            <h1>Administración de Productos</h1>
            <p>Agrega nuevos medicamentos y gestiona tu catálogo en tiempo real</p>
        </div>
    </section>

    <main class="container">
        <!-- Formulario para agregar productos -->
        <div class="form-section">
            <div class="form-title">
                📦 Incorporar nuevo producto
            </div>
            <form id="productForm" class="product-form">
                <div class="form-group">
                    <label>Nombre del producto *</label>
                    <input type="text" id="productName" required placeholder="Ej: Ibuprofeno 600mg">
                </div>
                <div class="form-group">
                    <label>Precio ($) *</label>
                    <input type="number" id="productPrice" required step="100" placeholder="Ej: 4990">
                </div>
                <div class="form-group">
                    <label>URL de imagen (opcional)</label>
                    <input type="text" id="productImage" placeholder="https://... o déjalo vacío">
                </div>
                <div class="form-group">
                    <label>Etiqueta (descuento/oferta)</label>
                    <select id="productBadge">
                        <option value="Oferta">🏷️ Oferta</option>
                        <option value="Envío rápido">🚚 Envío rápido</option>
                        <option value="-30%">🔥 -30%</option>
                        <option value="-20%">⚡ -20%</option>
                        <option value="Nuevo">✨ Nuevo</option>
                    </select>
                </div>
                <div class="form-group">
                    <button type="submit" class="btn-submit">➕ Agregar producto</button>
                </div>
            </form>
        </div>

        <!-- Listado de productos -->
        <h2 class="section-title">🛒 Nuestros productos</h2>
        <div id="productsContainer" class="product-grid">
            <!-- Los productos se cargarán dinámicamente aquí -->
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Farmacias Cruz Azul - Sistema de gestión de productos</p>
    </footer>

   <script src="script_formulario.js"></script>
</body>
</html>
