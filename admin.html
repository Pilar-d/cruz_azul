<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Panel Administrador - Cruz Azul</title>
    <link rel="stylesheet" href="css/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="admin-page">
    <!-- Login Panel -->
    <div id="loginPanel" class="login-container">
        <div class="login-box">
            <div class="login-header">
                <i class="fas fa-user-shield"></i>
                <h2>Panel Administrador</h2>
                <p>Farmacia Cruz Azul</p>
            </div>
            <form id="loginForm">
                <div class="form-group">
                    <i class="fas fa-user"></i>
                    <input type="text" id="adminUser" placeholder="Usuario" required>
                </div>
                <div class="form-group">
                    <i class="fas fa-lock"></i>
                    <input type="password" id="adminPass" placeholder="Contraseña" required>
                </div>
                <button type="submit" class="btn btn-primary">Iniciar Sesión <i class="fas fa-sign-in-alt"></i></button>
            </form>
            <div class="login-info">
                <p><i class="fas fa-info-circle"></i> Credenciales: admin / admin123</p>
            </div>
        </div>
    </div>

    <!-- Dashboard Admin (oculto hasta login) -->
    <div id="dashboardPanel" style="display: none;">
        <header>
            <nav class="navbar">
                <div class="nav-container">
                    <div class="logo">
                        <i class="fas fa-cross"></i>
                        <h1>Cruz Azul Admin</h1>
                    </div>
                    <ul class="nav-menu">
                        <li><a href="index.html" class="nav-link"><i class="fas fa-store"></i> Ver Tienda</a></li>
                        <li><a href="#" id="logoutBtn" class="nav-link logout-link"><i class="fas fa-sign-out-alt"></i> Cerrar Sesión</a></li>
                    </ul>
                </div>
            </nav>
        </header>

        <main class="admin-dashboard">
            <div class="container">
                <!-- Estadísticas -->
                <div class="dashboard-stats">
                    <div class="stat-card fade-up">
                        <i class="fas fa-boxes"></i>
                        <div class="stat-info">
                            <h3>Total Productos</h3>
                            <p id="totalProducts">0</p>
                        </div>
                    </div>
                    <div class="stat-card fade-up">
                        <i class="fas fa-chart-line"></i>
                        <div class="stat-info">
                            <h3>Visitas Hoy</h3>
                            <p>1,234</p>
                        </div>
                    </div>
                    <div class="stat-card fade-up">
                        <i class="fas fa-users"></i>
                        <div class="stat-info">
                            <h3>Clientes Registrados</h3>
                            <p>5,678</p>
                        </div>
                    </div>
                    <div class="stat-card fade-up">
                        <i class="fas fa-dollar-sign"></i>
                        <div class="stat-info">
                            <h3>Ventas del Mes</h3>
                            <p>$234,567</p>
                        </div>
                    </div>
                </div>

                <!-- Formulario para agregar productos -->
                <div class="admin-section fade-up">
                    <div class="section-header">
                        <h2><i class="fas fa-plus-circle"></i> Agregar Nuevo Producto</h2>
                        <div class="underline"></div>
                    </div>
                    <form id="addProductForm" class="product-form">
                        <div class="form-row">
                            <div class="form-group">
                                <label>Nombre del Producto *</label>
                                <input type="text" id="prodNombre" placeholder="Ej: Paracetamol 500mg" required>
                            </div>
                            <div class="form-group">
                                <label>Precio *</label>
                                <input type="number" id="prodPrecio" placeholder="Ej: 5990" step="0.01" required>
                            </div>
                        </div>
                        <div class="form-row">
                            <div class="form-group">
                                <label>URL de Imagen *</label>
                                <input type="url" id="prodImagen" placeholder="https://ejemplo.com/imagen.jpg" required>
                            </div>
                            <div class="form-group">
                                <label>Categoría</label>
                                <select id="prodCategoria">
                                    <option value="Medicamentos">Medicamentos</option>
                                    <option value="Cuidado Personal">Cuidado Personal</option>
                                    <option value="Vitaminas">Vitaminas</option>
                                    <option value="Primeros Auxilios">Primeros Auxilios</option>
                                </select>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Descripción *</label>
                            <textarea id="prodDescripcion" rows="3" placeholder="Descripción detallada del producto..." required></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary pulse-btn">
                            <i class="fas fa-save"></i> Agregar Producto
                        </button>
                    </form>
                </div>

                <!-- Lista de productos para gestionar -->
                <div class="admin-section fade-up">
                    <div class="section-header">
                        <h2><i class="fas fa-list"></i> Gestionar Productos</h2>
                        <div class="underline"></div>
                    </div>
                    <div class="products-management" id="productsManagement">
                        <!-- Lista dinámica de productos -->
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="js/admin.js"></script>
</body>
</html>
